{% extends "landing_layout.html" %}

{% block content %}
<div class="practo-page-container" style="background: #111827; min-height: calc(100vh - 70px); padding: 1rem;">
    <div class="container" style="max-width: 1400px; height: calc(100vh - 120px);">

        <div class="header"
            style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; color: white;">
            <div>
                <h1 style="font-size: 1.2rem; margin: 0;">Consultation Room #{{ room_id }}</h1>
            </div>
            <div
                style="color: #ef4444; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; background: rgba(239, 68, 68, 0.1); padding: 4px 12px; border-radius: 20px;">
                <div
                    style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px #ef4444;">
                </div>
                LIVE SECURE CALL
            </div>
        </div>

        <div class="video-grid" style="display: grid; grid-template-columns: 1fr 350px; gap: 1rem; height: 100%;">
            <!-- Main Video -->
            <div style="background: black; border-radius: 12px; position: relative; overflow: hidden;">
                <video id="localVideo" autoplay playsinline muted
                    style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>

                <div
                    style="position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem;">
                    Dr. A. Sharma (Cardiology)
                </div>

                <div id="loading"
                    style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; display: flex; flex-direction: column; align-items: center;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="margin-bottom: 1rem; opacity: 0.8;"></i>
                    <h3 style="font-weight: 500;">Connecting securely...</h3>
                </div>

                <!-- Floating Controls -->
                <div
                    style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(5px);">
                    <button class="btn-control on" onclick="toggleMic(this)"><i class="fas fa-microphone"></i></button>
                    <button class="btn-control on" onclick="toggleCam(this)"><i class="fas fa-video"></i></button>
                    <button class="btn-control btn-end" onclick="window.location.href='/appointments/my'"><i
                            class="fas fa-phone-slash"></i></button>
                </div>
            </div>

            <!-- Side Panel -->
            <div style="display: flex; flex-direction: column; gap: 1rem; height: 100%;">
                <!-- Self View -->
                <div
                    style="height: 200px; background: #1f2937; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #374151;">
                    <video id="selfVideo" autoplay playsinline muted
                        style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
                    <span
                        style="position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.6); color: white; padding: 2px 8px; font-size: 0.8rem; border-radius: 4px;">You</span>
                </div>

                <!-- Chat -->
                <div
                    style="flex: 1; background: #1f2937; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #374151;">
                    <div style="padding: 1rem; border-bottom: 1px solid #374151; color: white; font-weight: 600;">
                        Chat
                    </div>
                    <div style="flex: 1; padding: 1rem; overflow-y: auto; color: #94a3b8; font-size: 0.9rem;">
                        <p style="margin-bottom: 0.5rem;"><strong style="color: #60a5fa;">System:</strong> Connected to
                            encrypted channel.</p>
                        <p style="margin-bottom: 0.5rem;"><strong style="color: #fff;">Dr. Sharma:</strong> Hello! I am
                            reviewing your automated triage report.</p>
                    </div>
                    <div style="padding: 1rem; border-top: 1px solid #374151; display: flex; gap: 10px;">
                        <input type="text" placeholder="Type a message..."
                            style="flex: 1; background: #374151; border: none; padding: 0.8rem; border-radius: 6px; color: white; outline: none;">
                        <button
                            style="background: #2563eb; color: white; border: none; width: 40px; border-radius: 6px; cursor: pointer;"><i
                                class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-control {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        transition: all 0.2s;
    }

    .btn-control.on {
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    .btn-control.on:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .btn-control.off {
        background: #ef4444;
        color: white;
    }

    .btn-end {
        background: #ef4444;
        color: white;
        width: 45px;
    }

    .btn-end:hover {
        background: #dc2626;
    }
</style>

<script>
    async function startCall() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;
            document.getElementById('selfVideo').srcObject = stream;

            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 2000);
        } catch (e) {
            console.error("Camera access denied", e);
            alert("Please allow camera access for the consultation.");
        }
    }

    function toggleMic(btn) {
        btn.classList.toggle('on');
        btn.classList.toggle('off');
        const icon = btn.querySelector('i');
        icon.classList.toggle('fa-microphone');
        icon.classList.toggle('fa-microphone-slash');
    }

    function toggleCam(btn) {
        btn.classList.toggle('on');
        btn.classList.toggle('off');
        const icon = btn.querySelector('i');
        icon.classList.toggle('fa-video');
        icon.classList.toggle('fa-video-slash');

        const video = document.getElementById('localVideo');
        if (video.srcObject && video.srcObject.getVideoTracks().length > 0) {
            video.srcObject.getVideoTracks()[0].enabled = !video.srcObject.getVideoTracks()[0].enabled;
        }
    }

    startCall();
</script>
{% endblock %}
