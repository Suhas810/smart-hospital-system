{% extends "landing_layout.html" %}

{% block content %}
<div class="practo-page-container" style="background: #f0f0f5; min-height: calc(100vh - 70px); padding: 2rem 0;">
    <div class="container" style="max-width: 1000px;">
        <!-- Breadcrumb / Header -->
        <div style="margin-bottom: 2rem;">
            <h1 style="color: #2d2d32; font-size: 1.5rem; font-weight: 700;">Find Doctors</h1>
            <p style="color: #787887; font-size: 0.9rem;">Home > Doctors</p>
        </div>

        <!-- Search & Filter Row -->
        <div class="card"
            style="padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; background: white;">
            <div style="flex: 1; position: relative;">
                <i class="fas fa-search" style="position: absolute; left: 15px; top: 12px; color: #ccc;"></i>
                <form action="/doctors" method="GET" style="margin: 0;">
                    <input type="text" name="q" value="{{ request.args.get('q', '') }}"
                        placeholder="Search doctors, surgeries, etc."
                        style="width: 100%; border: 1px solid #d3d3d3; padding: 0.7rem 0.7rem 0.7rem 2.5rem; border-radius: 4px; outline: none; transition: border 0.2s;">
                </form>
            </div>
            <button
                style="background: #28328c; color: white; border: none; padding: 0.7rem 2rem; border-radius: 4px; cursor: pointer; font-weight: 600;">Search</button>
        </div>

        <!-- Doctors List -->
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
            {% for doc in doctors %}
            <div class="card p-doctor-card"
                style="display: flex; padding: 1.5rem; border: 1px solid #e0e0e0; background: white; border-radius: 4px; transition: box-shadow 0.2s;">
                <div style="margin-right: 1.5rem; flex-shrink: 0;">
                    <div
                        style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; background: #f0f0f5;">
                        <!-- Placeholder avatar -->
                        <!-- Placeholder avatar -->
                        <div
                            style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #e0e7ff; color: #28328c;">
                            <i class="fas fa-user-md fa-3x"></i>
                        </div>
                    </div>
                </div>
                <div style="flex: 1;">
                    <h2 style="color: #0ea5e9; font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem;">{{ doc.name
                        }}</h2>
                    <p style="color: #414146; font-size: 0.9rem; margin-bottom: 0.2rem;">{{ doc.spec }}</p>
                    <p style="color: #787887; font-size: 0.85rem; margin-bottom: 1rem;">{{ doc.exp }} experience</p>
                    <p style="font-weight: 600; font-size: 0.95rem; color: #2d2d32;">₹{{ doc.fee }} <span
                            style="font-weight: 400; color: #787887;">Consultation fee at clinic</span></p>
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed #e0e0e0;">
                        <span style="color: #0ea5e9; font-weight: 600; font-size: 0.85rem;"><i
                                class="fas fa-thumbs-up"></i> 98%</span>
                        <span style="color: #787887; font-size: 0.85rem; margin-left: 10px;">120 Patient Stories</span>
                    </div>
                </div>
                <div
                    style="display: flex; flex-direction: column; justify-content: flex-end; gap: 10px; min-width: 200px;">
                    <a href="/appointments/book/{{ doc.id }}"
                        style="background: #28328c; color: white; text-align: center; text-decoration: none; padding: 0.8rem; border-radius: 4px; font-weight: 600; font-size: 0.9rem;">Book
                        Appointment</a>
                    <button
                        style="background: white; border: 1px solid #28328c; color: #28328c; padding: 0.8rem; border-radius: 4px; font-weight: 600; font-size: 0.9rem; cursor: pointer;">Video
                        Consult</button>
                    <!-- Simulated availability -->
                    <div style="text-align: center; color: #059669; font-size: 0.8rem; margin-top: 0.5rem;">
                        <i class="fas fa-bolt"></i> Available Today
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>
</div>
{% endblock %}
